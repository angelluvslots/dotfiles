<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Base styles for better consistency across platforms (aka. CSS reset). -->
    <link rel="stylesheet" type="text/css" href="../normalize.css" />

    <!-- Custom styles. -->
    <link rel="stylesheet" type="text/css" href="./styles.css" />

    <!-- Add empty favicon to suppress not found errors. -->
    <link rel="icon" href="data:;" />

    <!-- Allows React to be run buildless via "text/babel" script below. -->
    <script
      src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"
      integrity="sha256-aS0B0wnsaDByLfE16h4MDCP1fQFccysd1YWOcV+gbBo="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, {
        useState,
        useEffect,
      } from 'https://esm.sh/react@18?dev';
      import { createRoot } from 'https://esm.sh/react-dom@18/client?dev';
      import * as zebar from 'https://esm.sh/zebar@2';

      const providers = zebar.createProviderGroup({
        network: { type: 'network' },
        glazewm: { type: 'glazewm' },
        cpu: { type: 'cpu' },
        date: { type: 'date', formatting: 'EEE d MMM t' },
        battery: { type: 'battery' },
        memory: { type: 'memory' },
        weather: { type: 'weather' },
      });

      createRoot(document.getElementById('root')).render(<App />);

      function App() {
        const [output, setOutput] = useState(providers.outputMap);

        useEffect(() => {
          providers.onOutput(() => setOutput(providers.outputMap));
        }, []);

        // Get icon to show for current weather status.
        function getWeatherIcon(weatherOutput) {
          switch (weatherOutput.status) {
            case 'cloudy_night':
              return <i className="nf nf-md-weather_sunny"></i>;
            case 'clear_night':
              return <i className="nf nf-md-weather_night"></i>;
            case 'cloudy_day':
              return <i className="nf nf-md-weather_cloudy"></i>;
            case 'cloudy_night':
              return <i className="nf nf-md-weather_cloudy"></i>;
            case 'light_rain_day':
              return <i className="nf nf-md-weather_rainy"></i>;
            case 'light_rain_night':
              return <i className="nf nf-md-weather_rainy"></i>;
            case 'heavy_rain_day':
              return <i className="nf nf-md-weather_pouring"></i>;
            case 'heavy_rain_night':
              return <i className="nf nf-md-weather_pouring"></i>;
            case 'snow_day':
              return <i className="nf nf-md-weather_snowy_heavy"></i>;
            case 'snow_night':
              return <i className="nf nf-md-weather_snowy_heavy"></i>;
            case 'thunder_day':
              return <i className="nf nf-md-weather_lightning_rainy"></i>;
            case 'thunder_night':
              return <i className="nf nf-md-weather_lightning_rainy"></i>;
          }
        }

        return (
          <div className="app">
            <div className="left">
              {output.glazewm && (
                <div className="workspaces">
                  {output.glazewm.currentWorkspaces.map(workspace => (
                    <button
                      className={`workspace ${workspace.hasFocus && 'focused'} ${workspace.isDisplayed && 'displayed'}`}
                      onClick={() =>
                        output.glazewm.runCommand(
                          `focus --workspace ${workspace.name}`,
                        )
                      }
                      key={workspace.name}
                    >
                      <i className="nf nf-oct-dot_fill"></i>
                    </button>
                  ))}
                </div>
              )}
              
            </div>

            <div className="center">
              {output.glazewm && output.glazewm.allwindows

              }
            </div>

            <div className="right">
              {output.glazewm && (
                <>
                  {output.glazewm.bindingModes.map(bindingMode => (
                    <button
                      className="binding-mode"
                      key={bindingMode.name}
                      onClick={() =>
                        output.glazewm.runCommand(
                          `wm-disable-binding-mode --name ${bindingMode.name}`,
                        )
                      }
                    >
                      {bindingMode.displayName ?? bindingMode.name}
                    </button>
                  ))}

                  <button
                    className={`tiling-direction nf ${output.glazewm.tilingDirection === 'horizontal' ? 'nf-md-swap_horizontal' : 'nf-md-swap_vertical'}`}
                    onClick={() =>
                      output.glazewm.runCommand('toggle-tiling-direction')
                    }
                  ></button>
                </>
              )}|
              <div className="date">
                {output.date?.formatted}
              </div>|
              {output.weather && (
                <div className="weather">
                  {getWeatherIcon(output.weather)}
                  {Math.round(output.weather.fahrenheitTemp)}°F
                </div>
              )}
            </div>
          </div>
        );
      }
    </script>
  </body>
</html>
